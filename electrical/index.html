<script>
// ── THEME TOGGLE ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeIcon').textContent  = isLight ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isLight ? 'LIGHT' : 'DARK';
  localStorage.setItem('poly-theme', isLight ? 'light' : 'dark');
}
(function(){
  if (localStorage.getItem('poly-theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeIcon').textContent  = '☀️';
    document.getElementById('themeLabel').textContent = 'LIGHT';
  }
})();

// ── PARTICLE NETWORK ──
const canvas = document.getElementById('particleCanvas');
const ctx    = canvas.getContext('2d');
const COUNT  = 55;
let particles = [];
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < COUNT; i++) {
  particles.push({
    x: Math.random()*W, y: Math.random()*H,
    r: 0.8 + Math.random()*2,
    vx: (Math.random()-.5)*.38, vy: (Math.random()-.5)*.38,
    alpha: 0.15 + Math.random()*.5,
    pulse: Math.random()*Math.PI*2,
    ps: 0.008 + Math.random()*.012
  });
}

function drawParticles() {
  ctx.clearRect(0,0,W,H);
  const isLight = document.body.classList.contains('light');
  const rgb = isLight ? '37,99,235' : '99,179,237';
  const maxDist = 115;
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.pulse+=p.ps;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    const a = p.alpha*(0.55+0.45*Math.sin(p.pulse));
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rgb},${a})`; ctx.fill();
  });
  for(let i=0;i<COUNT;i++) {
    for(let j=i+1;j<COUNT;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<maxDist){
        const la=(1-dist/maxDist)*(isLight?.07:.13);
        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(${rgb},${la})`; ctx.lineWidth=.8; ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
